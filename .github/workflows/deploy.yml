name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Trigger only when you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/health-app:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
              # 1. Pull the latest image
              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/health-app:latest
              
              # 2. Kill and remove ANY container using port 8080 (the "nuclear" option)
              sudo docker ps -q --filter "publish=8080" | xargs -r sudo docker rm -f
              
              # 3. Clean up by name just in case
              sudo docker stop health-app || true
              sudo docker rm health-app || true
              
              # 4. Run the new container
              sudo docker run -d \
                --name health-app \
                -p 8080:8080 \
                --env-file prod.env \
                ${{ secrets.DOCKERHUB_USERNAME }}/health-app:latest