name: CI/CD Pipeline

on:
  push:
    branches: [ main ] # Trigger only when you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/health-app:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/health-app:latest
            
            # Stop the old container (ignore error if it doesn't exist)
            sudo docker stop health-app || true
            sudo docker rm health-app || true
            
            # Run the new container using your prod.env file
            sudo docker run -d \
              --name health-app \
              -p 8080:8080 \
              --env-file prod.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/health-app:latest